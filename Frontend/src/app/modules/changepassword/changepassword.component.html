<!--Sidebar-->
<sidebar-left></sidebar-left>
<!--Content-->
<section class="body-content">
    <div class="content">
        <!--Header-->
        <header [title] = "title"></header>
        <!--Body-->
        <div class="">
            <div class="row bg-content">
                <div class="col-lg-9 fr-admin">
                    <div class="col-lg-12 eye">
                        <label>Old Password</label>
                        <input [(ngModel)]="oldPassword" (change)="check()" (keyup)="check()" id="oldpass" class="txt txt-oldpass" name="oldpass" type="password" placeholder="Old password...">
                        <a (click)="showPassword('oldpass')" href="javascript:void(0)"><span class="eye-icon"><i class="fa fa-eye"></i></span></a>
                    </div>
                    <div class="col-lg-12 eye">
                        <label>New Password</label>
                        <input [(ngModel)]="newPassword" (change)="check()" (keyup)="check()" id="newpass" class="txt txt-newpass" name="newpass" type="password" placeholder="New password...">
                        <a (click)="showPassword('newpass')" href="javascript:void(0)"><span class="eye-icon"><i class="fa fa-eye"></i></span></a>
                    </div>
                    <div [ngClass]="{'col-lg-12 eye': true, 'mess-vaild': !_comparePassword}">
                        <input [(ngModel)]="confirmPassword" (change)="check()" (keyup)="check()" id="confirmpass" class="txt txt-confirmpass" name="confirmpass" type="password" placeholder="Confirm password...">
                        <a (click)="showPassword('confirmpass')" href="javascript:void(0)"><span class="eye-icon eye-icon-confirm"><i class="fa fa-eye"></i></span></a>
                        <p *ngIf="!_comparePassword" class=""><i class="fa fa-level-up"></i> Password does not match</p>
                    </div>
                    <div class="col-lg-12 valid">
                        <ul>
                            <li [ngClass]="{'active': _atLeastOneLowerCase}"><i class="fa fa-check-circle-o"></i> <span>One lowercase character</span></li>
                            <li [ngClass]="{'active': _atLeastOneUpperCase}"><i class="fa fa-check-circle-o"></i> <span>One uppercase character</span></li>
                            <li [ngClass]="{'active': _atLeastOneNumber}"><i class="fa fa-check-circle-o"></i> <span>One number</span></li>
                            <li [ngClass]="{'active': _atLeastOneSpecialCharacter}"><i class="fa fa-check-circle-o"></i> <span>One special character</span></li>
                            <li [ngClass]="{'active': _isValidPassword}"><i class="fa fa-check-circle-o"></i> <span>8-21 required characters</span></li>
                        </ul>
                    </div>
                    <div class="col-lg-6 col-md-6 col-sm-6">
                        <button (click)="changePassword()" name="kyc-ok" type="button" class="btn btnkyc-ok">SAVE</button>
                    </div>
                    <div class="col-lg-6 col-md-6 col-sm-6">
                        <button (click)="cancel()" name="kyc-reject" type="button" class="btn btnkyc-reject">CANCEL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<script type="text/javascript" src="app/public/js/nav.js"></script>
